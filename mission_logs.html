<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Mission Logs &amp; Historical Analysis - Aegis C2 System</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="tailwind.config.js"></script>
<style>
        .scanline {
            width: 100%;
            height: 100px;
            z-index: 9999;
            position: absolute;
            pointer-events: none;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(130, 207, 255, 0.05) 50%, rgba(0, 0, 0, 0) 100%);
            opacity: 0.1;
        }
    </style>
</head>
<body class="bg-background text-on-surface antialiased overflow-hidden selection:bg-primary-container selection:text-on-primary-container">
<div class="scanline"></div>
<div id="header-placeholder"></div>
<div id="main-wrapper" class="mt-12 w-full h-[calc(100vh-48px)]">
<div id="sidebar-placeholder"></div>
<main class="h-full flex flex-1 overflow-hidden hex-bg">
    <div class="flex-1 p-gutter overflow-y-auto h-full scrollbar-hide flex flex-col gap-gutter lg:flex-row w-full">
        <section class="flex-1 flex flex-col bg-surface-container-low border border-slate-800 min-w-[400px]">
            <header class="p-panel-padding border-b border-slate-800 bg-surface-container-high flex justify-between items-center">
                <h3 class="font-headline-md text-headline-md text-on-surface uppercase tracking-widest">Archive Index</h3>
                <div class="flex gap-2">
                    <button id="mission-log-filter-button" class="bg-slate-800 border border-slate-700 text-on-surface px-3 py-1 text-data-mono font-data-mono hover:border-primary hover:text-primary transition-colors flex items-center gap-1">
                        <span class="material-symbols-outlined text-[14px]">filter_list</span>
                        FILTER
                    </button>
                    <button id="mission-log-export-csv-button" class="bg-slate-800 border border-slate-700 text-on-surface px-3 py-1 text-data-mono font-data-mono hover:border-primary hover:text-primary transition-colors flex items-center gap-1">
                        <span class="material-symbols-outlined text-[14px]">download</span>
                        CSV
                    </button>
                </div>
            </header>
            <div class="flex-1 overflow-y-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="sticky top-0 bg-surface-container-high border-b border-slate-800 text-slate-500 font-label-caps text-label-caps uppercase z-10">
                        <tr>
                            <th class="py-2 px-4 font-normal">Date / Time (Z)</th>
                            <th class="py-2 px-4 font-normal">Designation</th>
                            <th class="py-2 px-4 font-normal">Target Class</th>
                            <th class="py-2 px-4 font-normal">Sector</th>
                            <th class="py-2 px-4 font-normal text-right">Outcome</th>
                        </tr>
                    </thead>
                    <tbody id="mission-log-table-body" class="font-data-mono text-data-mono text-on-surface-variant divide-y divide-slate-800">
                        <tr>
                            <td colspan="5" class="py-8 px-4 text-center text-slate-500 uppercase tracking-widest">
                                Loading archive...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

        <section class="flex-[1.5] flex flex-col gap-gutter overflow-y-auto pr-2">
            <div id="detail-summary-container" class="bg-surface-container-low border border-slate-800 p-panel-padding flex flex-col gap-4"></div>

            <div class="bg-surface-container-low border border-slate-800 p-panel-padding">
                <h4 class="font-label-caps text-label-caps text-slate-500 uppercase mb-4 border-b border-slate-800 pb-2">Tactical Timeline</h4>
                <div id="detail-timeline" class="relative pl-6 border-l border-slate-700 ml-3 space-y-6 font-data-mono text-data-mono"></div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-gutter">
                <div class="bg-surface-container-low border border-slate-800 flex flex-col">
                    <div class="p-panel-padding border-b border-slate-800 bg-surface-container-high flex justify-between items-center">
                        <h4 class="font-label-caps text-label-caps text-slate-500 uppercase">Intelligence Attachments</h4>
                        <span class="material-symbols-outlined text-[16px] text-slate-500">photo_library</span>
                    </div>
                    <div id="detail-attachments" class="p-panel-padding grid grid-cols-2 gap-2 flex-1"></div>
                </div>

                <div id="detail-telemetry" class="bg-surface-container-low border border-slate-800 flex flex-col"></div>
            </div>

            <div class="bg-surface-container-low border border-sky-500/30 p-panel-padding">
                <div class="flex justify-between items-center border-b border-slate-800 pb-2 mb-4">
                    <h4 class="font-label-caps text-label-caps text-sky-500 uppercase flex items-center gap-2">
                        <span class="material-symbols-outlined text-sm">psychology</span>
                        AI Decision Audit Log
                    </h4>
                    <span class="text-[8px] font-data-mono text-slate-600 uppercase">Continuous Monitoring Active</span>
                </div>
                <div id="ai-audit-log" class="space-y-2 max-h-[200px] overflow-y-auto custom-scrollbar">
                    <div class="text-center py-6 text-slate-700 font-data-mono text-xs uppercase italic">
                        Waiting for AI Pipeline data...
                    </div>
                </div>
            </div>

            <div class="bg-surface-container-low border border-slate-800 p-panel-padding flex gap-4 mt-auto">
                <button id="mission-log-export-pdf-button" class="flex-1 bg-transparent border border-slate-600 text-on-surface hover:bg-slate-800 hover:border-slate-400 py-2 px-4 font-headline-md text-[12px] uppercase tracking-wider transition-colors flex justify-center items-center gap-2">
                    <span class="material-symbols-outlined text-[16px]">picture_as_pdf</span>
                    Export Classified PDF
                </button>
                <button id="mission-log-generate-protest-button" class="flex-1 bg-transparent border border-slate-600 text-on-surface hover:bg-slate-800 hover:border-slate-400 py-2 px-4 font-headline-md text-[12px] uppercase tracking-wider transition-colors flex justify-center items-center gap-2">
                    <span class="material-symbols-outlined text-[16px]">gavel</span>
                    Generate Protest
                </button>
                <button id="mission-log-sync-button" class="flex-[1.5] bg-inverse-primary text-on-primary hover:bg-primary hover:text-on-primary-fixed font-headline-md text-[12px] uppercase tracking-wider font-bold transition-colors flex justify-center items-center gap-2">
                    <span class="material-symbols-outlined text-[16px]">sync</span>
                    Sync to NATO HQ
                </button>
            </div>
        </section>
    </div>
</main>
</div>
<script src="./ai-system.js"></script>
<script src="./shared-components.js"></script>

(() => {

                { id: "FLIR_POD", url: "https://lh3.googleusercontent.com/aida-public/AB6AXuClV5jyBFzpE6y5k1FWOZK-dleCnndwMR6QFOjPsWw8xAp_eW5ORucePIzFpMJz8faDK7S0QIo_Glah6KvFixQmFeoKHeGyOOaVFdh5ZTY29Wxcp9zRUyACsqaTEQR6EZ5vod85C_4MpPvG4gEQQuaXIT1a-HyaMyycerV-CiOla8-YFyfmtLvJfHgISHwotRHuqrYwDquKzGs-aMKFwLCBjB6j2fSUZpZ7oe7AKQdnXsC0wWjxYpXUQOmTG-buioDXQvNiXH45726r" }
            ]
        },
        {
            id: "LOG-003",
            date: "2024-08-14 22:45Z",
            designation: "INCIDENT #2024-08-14-B",
            targetClass: "IL-20 Coot",
            sector: "North Sea",
            outcome: "Intercepted",
            outcomeColor: "error",
            summary: "IL-20 Coot electronic intelligence aircraft intercepted by QRA flight in North Sea area. Target followed directions for identification. No violations noted.",
            timeline: [
                { time: "22:45:00Z", msg: "Intercept initiated." },
                { time: "23:10:00Z", msg: "Surveillance handover complete." }
            ],
            telemetry: { speed: "0.7M", speedPct: "35%", altitude: "240", altitudePct: "50%", bearing: "180", exitBearing: "185" },
            images: [
                { id: "VID_CAM_1", url: "https://lh3.googleusercontent.com/aida-public/AB6AXuCvqq-pLRz_nPgz06QGDxr-Pi94zIFgseu8nqdGAasWNTcJvCllk3LlRMpYvL-pqvPHGXRWOU6e6aRgCneWW4cH_JlbMzu1pgVeXpmOegGPANKPUFBZ6UaUANADthCU9osyaw9QBM-tKHQurVeTcheYhrPHVl0FdiUeIxfx1M7n6uYUlvlagKCv0-YFKclTQwcPxti-HCBGX79-YqcF7hdt_NkinCGBEfVy9ju8SopNdbztCmastbFvnuH4p22YkfSq64xOZWIxiSy0" }
            ]
        }
    ];

    const missionLogState = globalThis.__missionLogState || (globalThis.__missionLogState = {
        currentLogId: "LOG-002",
        activeFilter: "ALL",
        auditListener: null,
        storeListener: null
    });
    const filterOrder = ["ALL", "Tracking", "Investigating", "Escorted", "Intercepted", "Resolved", "Support Required", "Monitored"];

    function escapeHtml(value) {
        return String(value)
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#39;");
    }

    function showToast(title, message, icon = "info", type = "primary") {
        if (globalThis.SharedComponents?.showToast) {
            globalThis.SharedComponents.showToast(title, message, icon, type);
        } else {
            console.info(`${title}: ${message}`);
        }
    }

    function getDynamicMissionLogs() {
        if (globalThis.MissionLogStore?.getRecords) {
            return globalThis.MissionLogStore.getRecords();
        }
        try {
            const raw = localStorage.getItem("c2_mission_log_records_v1");
            const parsed = JSON.parse(raw || "[]");
            return Array.isArray(parsed) ? parsed : [];
        } catch {
            return [];
        }
    }

    function getAllLogs() {
        const merged = [...getDynamicMissionLogs(), ...missionLogs];
        const seen = new Set();
        return merged.filter((log) => {
            if (seen.has(log.id)) return false;
            seen.add(log.id);
            return true;
        });
    }

    function getVisibleLogs() {
        const allLogs = getAllLogs();
        if (missionLogState.activeFilter === "ALL") return allLogs;
        return allLogs.filter((log) => log.outcome === missionLogState.activeFilter);
    }

    function getCurrentLog() {
        const visibleLogs = getVisibleLogs();
        if (!visibleLogs.some((log) => log.id === missionLogState.currentLogId)) {
            missionLogState.currentLogId = visibleLogs[0]?.id || getAllLogs()[0]?.id || null;
        }
        return getAllLogs().find((log) => log.id === missionLogState.currentLogId) || null;
    }

    function persistLog(log) {
        if (!globalThis.MissionLogStore?.upsert) return;
        if (!String(log.id).startsWith("ML-")) return;
        globalThis.MissionLogStore.upsert(log);
    }

    function updateFilterButton() {
        const button = document.getElementById("mission-log-filter-button");
        if (!button) return;
        const label = missionLogState.activeFilter === "ALL"
            ? "FILTER: ALL"
            : `FILTER: ${missionLogState.activeFilter.toUpperCase()}`;
        button.innerHTML = `<span class="material-symbols-outlined text-[14px]">filter_list</span> ${label}`;
    }

    function renderTable() {
        const tableBody = document.getElementById("mission-log-table-body");
        if (!tableBody) return;

        const visibleLogs = getVisibleLogs();
        updateFilterButton();

        if (visibleLogs.length === 0) {
            tableBody.innerHTML = `
                <tr>
                    <td colspan="5" class="py-8 px-4 text-center text-slate-500 uppercase tracking-widest">
                        No mission logs match the current filter.
                    </td>
                </tr>
            `;
            return;
        }

        tableBody.innerHTML = visibleLogs.map((log) => `
            <tr class="${log.id === missionLogState.currentLogId ? "bg-surface-container-high/50 border-primary" : "border-transparent"} hover:bg-slate-800/50 cursor-pointer border-l-2" onclick="selectLog('${log.id}')">
                <td class="py-3 px-4 ${log.id === missionLogState.currentLogId ? "text-primary" : ""}">${escapeHtml(log.date)}</td>
                <td class="py-3 px-4 ${log.id === missionLogState.currentLogId ? "text-primary" : "text-slate-300"}">${escapeHtml(log.designation)}</td>
                <td class="py-3 px-4 ${log.id === missionLogState.currentLogId ? "text-primary" : ""}">${escapeHtml(log.targetClass)}</td>
                <td class="py-3 px-4 ${log.id === missionLogState.currentLogId ? "text-primary" : ""}">${escapeHtml(log.sector)}</td>
                <td class="py-3 px-4 text-right text-${log.outcomeColor || "slate-400"}">${escapeHtml(log.outcome)}</td>
            </tr>
        `).join("");
    }

    function selectLog(id) {
        missionLogState.currentLogId = id;
        renderTable();
        renderDetail();
    }

    function renderDetail() {
        const log = getCurrentLog();
        if (!log) return;

        const timeline = Array.isArray(log.timeline) ? log.timeline : [];
        const images = Array.isArray(log.images) ? log.images : [];
        const telemetry = log.telemetry || {};

        document.getElementById("detail-summary-container").innerHTML = `
            <div class="flex justify-between items-start border-b border-slate-800 pb-4">
                <div>
                    <h2 class="font-headline-lg text-headline-lg text-primary uppercase tracking-wider">${escapeHtml(log.designation)}</h2>
                    <p class="font-data-mono text-data-mono text-slate-500 mt-1">CLASS: ${escapeHtml(log.targetClass)} | SECTOR: ${escapeHtml(log.sector)} | STATUS: RESOLVED</p>
                </div>
                <div class="bg-${log.outcomeColor || "slate-400"}/10 border border-${log.outcomeColor || "slate-400"}/30 px-3 py-1 text-${log.outcomeColor || "slate-400"} font-label-caps text-label-caps flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-${log.outcomeColor || "slate-400"}"></span>
                    ${escapeHtml(String(log.outcome || "Unknown").toUpperCase())}
                </div>
            </div>
            <div>
                <h4 class="font-label-caps text-label-caps text-slate-500 uppercase mb-2">Executive Summary</h4>
                <p class="font-body-sm text-body-sm text-on-surface-variant leading-relaxed">${escapeHtml(log.summary || "No summary available.")}</p>
            </div>
        `;

        document.getElementById("detail-timeline").innerHTML = timeline.length > 0
            ? timeline.map((entry) => `
                <div class="relative">
                    <div class="absolute -left-[31px] top-1 w-3 h-3 bg-slate-800 border-2 border-slate-500 rounded-full"></div>
                    <div class="text-slate-500">${escapeHtml(entry.time)}</div>
                    <div class="text-on-surface mt-1">${escapeHtml(entry.msg)}</div>
                </div>
            `).join("")
            : `<div class="text-slate-500 uppercase tracking-wider">No tactical timeline data available.</div>`;

        const attachmentsHtml = images.map((img) => `
            <div class="relative border border-slate-700 group cursor-pointer h-24 bg-slate-900 overflow-hidden">
                <img alt="${escapeHtml(img.id)}" class="w-full h-full object-cover opacity-60 mix-blend-luminosity group-hover:opacity-100 transition-opacity" src="${escapeHtml(img.url)}"/>
                <div class="absolute bottom-1 left-1 text-[8px] font-data-mono text-primary bg-black/50 px-1">${escapeHtml(img.id)}</div>
            </div>
        `).join("");

        document.getElementById("detail-attachments").innerHTML = attachmentsHtml + `
            <button type="button" id="mission-log-attach-button" class="relative border border-slate-700 group cursor-pointer h-24 bg-slate-900 overflow-hidden col-span-2">
                <div class="w-full h-full flex flex-col items-center justify-center text-slate-600 border border-dashed border-slate-700 hover:text-primary hover:border-primary transition-colors">
                    <span class="material-symbols-outlined text-[24px] mb-1">add_a_photo</span>
                    <span class="font-label-caps text-[8px] uppercase">Attach Post-Flight</span>
                </div>
            </button>
        `;

        document.getElementById("detail-telemetry").innerHTML = `
            <div class="p-panel-padding border-b border-slate-800 bg-surface-container-high flex justify-between items-center">
                <h4 class="font-label-caps text-label-caps text-slate-500 uppercase">Intercept Telemetry</h4>
                <span class="material-symbols-outlined text-[16px] text-slate-500">show_chart</span>
            </div>
            <div class="p-panel-padding flex-1 flex flex-col gap-4">
                <div>
                    <div class="flex justify-between font-label-caps text-label-caps mb-1">
                        <span class="text-slate-500">Max Speed (Mach)</span>
                        <span class="text-primary">${escapeHtml(telemetry.speed || "0.0M")}</span>
                    </div>
                    <div class="w-full bg-slate-900 h-1">
                        <div class="bg-primary h-1" style="width: ${escapeHtml(telemetry.speedPct || "10%")}"></div>
                    </div>
                </div>
                <div>
                    <div class="flex justify-between font-label-caps text-label-caps mb-1">
                        <span class="text-slate-500">Intercept Altitude (FL)</span>
                        <span class="text-tertiary">${escapeHtml(telemetry.altitude || "000")}</span>
                    </div>
                    <div class="w-full bg-slate-900 h-1">
                        <div class="bg-tertiary h-1" style="width: ${escapeHtml(telemetry.altitudePct || "10%")}"></div>
                    </div>
                </div>
                <div class="mt-auto grid grid-cols-2 gap-2 border-t border-slate-800 pt-3">
                    <div>
                        <div class="font-label-caps text-[8px] text-slate-500 uppercase">Initial Bearing</div>
                        <div class="font-data-mono text-[14px] text-on-surface">${escapeHtml(telemetry.bearing || "000")}&deg; True</div>
                    </div>
                    <div>
                        <div class="font-label-caps text-[8px] text-slate-500 uppercase">Exit Bearing</div>
                        <div class="font-data-mono text-[14px] text-on-surface">${escapeHtml(telemetry.exitBearing || "000")}&deg; True</div>
                    </div>
                </div>
            </div>
        `;

        const attachButton = document.getElementById("mission-log-attach-button");
        if (attachButton) attachButton.onclick = attachPostFlight;
    }

    function buildAuditMarkup(entry) {
        return `
            <div class="flex gap-4 border-l-2 border-sky-500 pl-4 py-2 bg-sky-950/10 mb-2">
                <div class="w-20 font-data-mono text-[10px] text-sky-500 shrink-0">${escapeHtml(entry.timestamp)}</div>
                <div class="flex-1">
                    <div class="font-label-caps text-[9px] text-sky-400 uppercase font-bold tracking-wider">${escapeHtml(entry.phase)}</div>
                    <div class="font-data-mono text-[11px] text-slate-300 mt-0.5">${escapeHtml(entry.message)}</div>
                </div>
            </div>
        `;
    }

    function renderAuditLog() {
        const auditContainer = document.getElementById("ai-audit-log");
        if (!auditContainer) return;

        const currentLog = getCurrentLog();
        const missionAuditEntries = Array.isArray(currentLog?.auditEntries) ? currentLog.auditEntries : [];
        const fallbackAuditEntries = globalThis.AISystem?.state?.logs || [];
        const entries = missionAuditEntries.length > 0 ? missionAuditEntries : fallbackAuditEntries;

        if (entries.length === 0) {
            auditContainer.innerHTML = `
                <div class="text-center py-6 text-slate-700 font-data-mono text-xs uppercase italic">
                    Waiting for AI Pipeline data...
                </div>
            `;
            return;
        }

        auditContainer.innerHTML = entries
            .slice(-20)
            .reverse()
            .map(buildAuditMarkup)
            .join("");
    }

    function handleAIUpdate(event) {
        const currentLog = getCurrentLog();
        if (Array.isArray(currentLog?.auditEntries) && currentLog.auditEntries.length > 0) {
            renderAuditLog();
            return;
        }

        const auditContainer = document.getElementById("ai-audit-log");
        if (!auditContainer) return;
        if (auditContainer.querySelector(".text-center")) auditContainer.innerHTML = "";
        const wrapper = document.createElement("div");
        wrapper.innerHTML = buildAuditMarkup(event.detail).trim();
        auditContainer.prepend(wrapper.firstElementChild);
    }

    function downloadFile(filename, content, type = "text/plain;charset=utf-8") {
        const blob = new Blob([content], { type });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
    }

    function exportCsv() {
        const rows = getVisibleLogs();
        const csvLines = [
            ["id", "date", "designation", "targetClass", "sector", "outcome", "source"],
            ...rows.map((log) => [log.id, log.date, log.designation, log.targetClass, log.sector, log.outcome, log.source || "Archive"])
        ].map((columns) => columns.map((value) => `"${String(value).replaceAll('"', '""')}"`).join(","));

        downloadFile("mission_logs_export.csv", csvLines.join("\n"), "text/csv;charset=utf-8");
        showToast("CSV READY", `${rows.length} mission log record(s) exported.`, "download", "success");
    }

    function exportPrintableBrief() {
        window.print();
        showToast("PRINT BRIEF", "Print dialog opened for the current mission package.", "picture_as_pdf", "primary");
    }

    function generateProtest() {
        const log = getCurrentLog();
        if (!log) return;

        const protestText = [
            "CLASSIFIED // DRAFT DIPLOMATIC PROTEST",
            `REFERENCE: ${log.designation}`,
            `DATE/TIME (Z): ${log.date}`,
            `SECTOR: ${log.sector}`,
            `TARGET CLASS: ${log.targetClass}`,
            `OUTCOME: ${log.outcome}`,
            "",
            "SUMMARY:",
            log.summary || "No summary available.",
            "",
            "REQUESTED ACTION:",
            "Request formal review of the incident profile and issue a diplomatic clarification through established NATO channels."
        ].join("\n");

        downloadFile(`${log.id.toLowerCase()}_protest.txt`, protestText);
        showToast("PROTEST DRAFTED", `Draft protest package created for ${log.designation}.`, "gavel", "success");
    }

    function syncToNato() {
        const log = getCurrentLog();
        if (!log) return;

        showToast("SYNC IN PROGRESS", `Transmitting ${log.designation} to NATO HQ.`, "sync", "primary");
        setTimeout(() => {
            if (globalThis.AISystem?.log) {
                globalThis.AISystem.log("REPORT", `Mission package ${log.designation} synchronized to NATO HQ.`);
            }
            if (String(log.id).startsWith("ML-")) {
                log.outcome = "Resolved";
                log.outcomeColor = "slate-400";
                persistLog(log);
            }
            renderTable();
            renderDetail();
            renderAuditLog();
            showToast("SYNC COMPLETE", `${log.designation} acknowledged by NATO relay node.`, "cloud_done", "success");
        }, 900);
    }

    function cycleFilter() {
        const currentIndex = filterOrder.indexOf(missionLogState.activeFilter);
        missionLogState.activeFilter = filterOrder[(currentIndex + 1) % filterOrder.length];
        renderTable();
        renderDetail();
        renderAuditLog();
        showToast("FILTER UPDATED", `Archive view set to ${missionLogState.activeFilter}.`, "filter_list", "primary");
    }

    function attachPostFlight() {
        const log = getCurrentLog();
        if (!log) return;

        const placeholderSvg = encodeURIComponent(`
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
                <rect width="320" height="180" fill="#020617"/>
                <rect x="14" y="14" width="292" height="152" fill="none" stroke="#0ea5e9" stroke-dasharray="8 6"/>
                <text x="50%" y="46%" dominant-baseline="middle" text-anchor="middle" fill="#38bdf8" font-family="monospace" font-size="16">POST-FLIGHT IMAGE</text>
                <text x="50%" y="60%" dominant-baseline="middle" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="11">${escapeHtml(log.designation)}</text>
            </svg>
        `);

        const images = Array.isArray(log.images) ? log.images : (log.images = []);
        images.push({
            id: `POST_FLIGHT_${String(images.length + 1).padStart(2, "0")}`,
            url: `data:image/svg+xml;charset=utf-8,${placeholderSvg}`
        });

        persistLog(log);
        renderDetail();
        showToast("ATTACHMENT ADDED", `Post-flight placeholder attached to ${log.designation}.`, "add_photo_alternate", "success");
    }

    function scrollToTarget(selector) {
        const target = document.querySelector(selector);
        if (!target) return;
        target.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function bindActions() {
        const filterButton = document.getElementById("mission-log-filter-button");
        const exportCsvButton = document.getElementById("mission-log-export-csv-button");
        const exportPdfButton = document.getElementById("mission-log-export-pdf-button");
        const protestButton = document.getElementById("mission-log-generate-protest-button");
        const syncButton = document.getElementById("mission-log-sync-button");
        const intelLink = document.getElementById("mission-logs-intel-link");

        if (filterButton) filterButton.onclick = cycleFilter;
        if (exportCsvButton) exportCsvButton.onclick = exportCsv;
        if (exportPdfButton) exportPdfButton.onclick = exportPrintableBrief;
        if (protestButton) protestButton.onclick = generateProtest;
        if (syncButton) syncButton.onclick = syncToNato;
        if (intelLink) intelLink.onclick = (event) => SharedComponents.handleNav(event, "./intel-brief.html");
    }

    function initMissionLogs() {
        bindActions();
        renderTable();
        renderDetail();
        renderAuditLog();
    }

    if (missionLogState.auditListener) {
        window.removeEventListener("ai-update", missionLogState.auditListener);
    }
    missionLogState.auditListener = handleAIUpdate;
    window.addEventListener("ai-update", missionLogState.auditListener);

    if (missionLogState.storeListener) {
        window.removeEventListener("mission-log-updated", missionLogState.storeListener);
    }
    missionLogState.storeListener = () => initMissionLogs();
    window.addEventListener("mission-log-updated", missionLogState.storeListener);

    window.selectLog = selectLog;
    initMissionLogs();
})();
</script>
</body>
</html>
