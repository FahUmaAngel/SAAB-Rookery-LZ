<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Multi-Domain Sensor Map</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="tailwind.config.js"></script>
    <style>
        /* Leaflet overrides for tactical dark theme */
        .leaflet-container { background: #0a0e14 !important; font-family: 'Inter', sans-serif; }
        .leaflet-control-zoom a { background: #1a1f2e !important; color: #82cfff !important; border: 1px solid #3e4850 !important; }
        .leaflet-control-zoom a:hover { background: #252b3b !important; }
        .leaflet-control-attribution { display: none !important; }
        .leaflet-popup-content-wrapper { background: rgba(10,14,20,0.95) !important; border: 1px solid #3e4850 !important; border-radius: 4px !important; color: #e5e2e1 !important; font-family: 'Inter', sans-serif !important; box-shadow: 0 0 20px rgba(0,0,0,0.5) !important; }
        .leaflet-popup-tip { background: rgba(10,14,20,0.95) !important; border: 1px solid #3e4850 !important; }
        .leaflet-popup-content { margin: 8px 12px !important; font-size: 11px !important; line-height: 1.6 !important; }

        /* Hostile pulse */
        @keyframes hostilePulse {
            0%, 100% { box-shadow: 0 0 6px rgba(255,85,85,0.8); transform: rotate(45deg) scale(1); }
            50%      { box-shadow: 0 0 14px rgba(255,85,85,1); transform: rotate(45deg) scale(1.15); }
        }
        .hostile-diamond { animation: hostilePulse 1.5s ease-in-out infinite; }

        /* Friendly pulse */
        @keyframes friendlyPulse {
            0%, 100% { box-shadow: 0 0 4px rgba(130,207,255,0.8); }
            50%      { box-shadow: 0 0 12px rgba(130,207,255,1); }
        }
        .friendly-dot { animation: friendlyPulse 2s ease-in-out infinite; }

        /* Unknown pulse */
        @keyframes unknownPulse {
            0%, 100% { box-shadow: 0 0 4px rgba(245,158,11,0.8); }
            50%      { box-shadow: 0 0 10px rgba(245,158,11,1); }
        }
        .unknown-dot { animation: unknownPulse 2s ease-in-out infinite; }

        /* Chart container */
        .chart-container { height: 120px; position: relative; }
        .chart-line { stroke-width: 2; fill: none; }
        .chart-grid { stroke: rgba(255,255,255,0.05); }

        .bg-hex-grid {
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='103.923' viewBox='0 0 60 103.923' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0l30 17.32v34.64L30 69.28 0 51.96V17.32zM30 103.923L0 86.603V51.96l30 17.32 30-17.32v34.643z' fill='none' stroke='rgba(56, 189, 248, 0.1)' stroke-width='1'/%3E%3C/svg%3E");
            background-size: 60px 103.923px;
        }
    </style>
</head>

<body class="bg-background text-on-surface antialiased overflow-hidden selection:bg-primary-container selection:text-on-primary-container">
    <!-- TopNavBar -->
    <div id="header-placeholder"></div>
    <div id="main-wrapper" class="mt-12 w-full h-[calc(100vh-48px)] flex">
        <!-- SideNavBar -->
        <div id="sidebar-placeholder"></div>
        <!-- Main Content Canvas -->
        <main class="flex-1 flex h-full relative">
            <!-- Tactical Map Area (Fluid) -->
            <div class="flex-1 relative overflow-hidden bg-surface-dim border-r border-outline-variant/30">
                <!-- Hex Grid -->
                <div class="absolute inset-0 z-10 bg-hex-grid pointer-events-none opacity-20"></div>
                <!-- Leaflet Map Container -->
                <div id="map-container" class="absolute inset-0 z-0"></div>
            </div>

            <!-- Sidebar Detail (Fixed Right) -->
            <aside class="w-[380px] bg-surface border-l border-outline-variant flex flex-col z-30 overflow-y-auto">
                <!-- Target Selector -->
                <div class="p-gutter border-b border-outline-variant bg-surface-container-low">
                    <div class="flex justify-between items-center mb-3">
                        <h2 class="font-label-caps text-label-caps text-on-surface-variant">ACTIVE TRACK</h2>
                        <button id="btn-audio" class="flex items-center gap-1 px-2 py-1 border border-outline-variant rounded text-on-surface-variant hover:bg-surface-container transition-colors">
                            <span class="material-symbols-outlined text-[16px]">volume_up</span>
                            <span class="font-data-mono text-[10px]">AUDIO</span>
                        </button>
                    </div>
                    <div id="target-list" class="flex flex-col gap-1 max-h-[100px] overflow-y-auto">
                        <!-- Target items injected by JS -->
                    </div>
                </div>

                <!-- Active Target Header -->
                <div class="p-gutter border-b border-outline-variant bg-surface-container-low">
                    <div class="flex justify-between items-start mb-2">
                        <h2 class="font-headline-md text-headline-md text-error flex items-center gap-2">
                            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">warning</span>
                            TRACK DETAIL
                        </h2>
                        <span id="target-status-badge" class="px-1.5 py-0.5 bg-error-container text-on-error-container font-label-caps text-label-caps border border-error/30">HOSTILE</span>
                    </div>
                    <div id="target-callsign" class="font-data-mono text-[18px] text-on-surface font-bold tracking-wider uppercase mb-1">BOGEY_GOLF_42</div>
                    <div id="target-class" class="font-data-mono text-[12px] text-on-surface-variant mb-2">SU-27 FLANKER</div>
                </div>

                <!-- Telemetry Bento Grid -->
                <div class="p-gutter flex flex-col gap-unit overflow-y-auto flex-1">
                    <!-- Row 1: Kinematics -->
                    <div class="grid grid-cols-2 gap-unit">
                        <div class="bg-surface-container border border-outline-variant p-panel-padding flex flex-col relative overflow-hidden">
                            <span class="font-label-caps text-label-caps text-on-surface-variant mb-2">TARGET SPEED</span>
                            <div class="font-headline-lg text-headline-lg text-primary flex items-baseline gap-1">
                                <span id="sm-speed">0.85</span> <span class="font-data-mono text-data-mono text-primary/70">MACH</span>
                            </div>
                        </div>
                        <div class="bg-surface-container border border-outline-variant p-panel-padding flex flex-col relative overflow-hidden">
                            <span class="font-label-caps text-label-caps text-on-surface-variant mb-2">ALTITUDE</span>
                            <div class="font-headline-lg text-headline-lg text-primary flex items-baseline gap-1">
                                <span id="sm-altitude">32K</span> <span class="font-data-mono text-data-mono text-primary/70">FT</span>
                            </div>
                        </div>
                    </div>

                    <!-- Row 2: Position -->
                    <div class="bg-surface-container border border-outline-variant p-panel-padding mt-2 flex flex-col">
                        <span class="font-label-caps text-label-caps text-on-surface-variant mb-2">POSITION</span>
                        <div class="grid grid-cols-2 gap-2">
                            <div class="flex flex-col">
                                <span class="font-label-caps text-[8px] text-outline mb-1">LAT/LON</span>
                                <span id="sm-position" class="font-data-mono text-data-mono text-on-surface">57.30°N 19.05°E</span>
                            </div>
                            <div class="flex flex-col">
                                <span class="font-label-caps text-[8px] text-outline mb-1">RANGE</span>
                                <span id="sm-range" class="font-data-mono text-data-mono text-on-surface">12.4 NM</span>
                            </div>
                        </div>
                    </div>

                    <!-- Row 3: Sensor Fusion -->
                    <div class="bg-surface-container border border-outline-variant p-panel-padding mt-2 flex flex-col">
                        <div class="flex justify-between items-center mb-3 border-b border-outline-variant/50 pb-2">
                            <span class="font-label-caps text-label-caps text-on-surface-variant">SENSOR FUSION</span>
                            <span id="sm-fused-pct" class="font-data-mono text-data-mono text-primary">94.2%</span>
                        </div>
                        <div class="flex h-2 w-full bg-surface-container-highest border border-outline-variant/30 overflow-hidden">
                            <div id="bar-radar" class="h-full bg-primary transition-all duration-700" style="width: 48%"></div>
                            <div id="bar-esm" class="h-full bg-tertiary transition-all duration-700" style="width: 26%"></div>
                            <div id="bar-sat" class="h-full bg-sky-400 transition-all duration-700" style="width: 14%"></div>
                        </div>
                    </div>
                </div>

                <!-- Row 5: Sensor Filters -->
                <div class="p-gutter border-t border-outline-variant bg-surface-container-low">
                    <span class="font-label-caps text-label-caps text-on-surface-variant mb-3 block">SENSOR FILTERS</span>
                    <div class="flex flex-col gap-2">
                        <label data-filter="hostile" class="flex items-center justify-between p-2 border border-error/30 bg-error-container/20 cursor-pointer hover:bg-error-container/30">
                            <div class="flex items-center gap-2">
                                <span class="material-symbols-outlined text-[16px] text-error">warning</span>
                                <span class="font-data-mono text-data-mono text-on-surface">HOSTILE</span>
                            </div>
                            <input type="checkbox" checked class="w-4 h-4 accent-error">
                        </label>
                        <label data-filter="unknown" class="flex items-center justify-between p-2 border border-warning/30 bg-warning-container/20 cursor-pointer hover:bg-warning-container/30">
                            <div class="flex items-center gap-2">
                                <span class="material-symbols-outlined text-[16px] text-warning">help</span>
                                <span class="font-data-mono text-data-mono text-on-surface">UNKNOWN</span>
                            </div>
                            <input type="checkbox" checked class="w-4 h-4 accent-warning">
                        </label>
                        <label data-filter="friendly" class="flex items-center justify-between p-2 border border-primary/30 bg-primary-container/20 cursor-pointer hover:bg-primary-container/30">
                            <div class="flex items-center gap-2">
                                <span class="material-symbols-outlined text-[16px] text-primary">verified</span>
                                <span class="font-data-mono text-data-mono text-on-surface">FRIENDLY</span>
                            </div>
                            <input type="checkbox" checked class="w-4 h-4 accent-primary">
                        </label>
                    </div>
                </div>
            </aside>
        </main>
    </div>

    <script src="./sensor-data.js"></script>
    <script src="./shared-components.js"></script>
    <script>
        // --- Leaflet Map Setup ---
        function initMap() {
            // Cleanup previous
            if (window.sensorMapInstance) {
                window.sensorMapInstance.remove();
                window.sensorMapInstance = null;
            }

            // Load Leaflet
            if (!document.getElementById('leaflet-css')) {
                const link = document.createElement('link');
                link.id = 'leaflet-css';
                link.rel = 'stylesheet';
                link.href = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.css';
                document.head.appendChild(link);
            }

            function loadLeafletJS(callback) {
                if (typeof L !== 'undefined') { callback(); return; }
                if (document.getElementById('leaflet-js')) {
                    const checkL = setInterval(() => {
                        if (typeof L !== 'undefined') { clearInterval(checkL); callback(); }
                    }, 50);
                    return;
                }
                const script = document.createElement('script');
                script.id = 'leaflet-js';
                script.src = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
                script.onload = callback;
                document.head.appendChild(script);
            }

            loadLeafletJS(() => {
                const map = L.map('map-container', {
                    center: [57.5, 18.5],
                    zoom: 6,
                    zoomControl: false,
                    attributionControl: false,
                    minZoom: 4,
                    maxZoom: 10
                });

                window.sensorMapInstance = map;
                L.control.zoom({ position: 'bottomright' }).addTo(map);

                // Dark tiles
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {
                    subdomains: 'abcd',
                    maxZoom: 19
                }).addTo(map);

                // Layer groups
                window.trackMarkers = L.layerGroup().addTo(map);
                window.trackLabels = L.layerGroup().addTo(map);

                // Store references
                window._targetMarkers = {};
                window._targetLabels = {};

                // Initial render
                updateAllTargets();
            });
        }

        // --- Target Markers ---
        function createTargetIcon(status) {
            let colorClass = status === 'HOSTILE' ? 'hostile-diamond' : status === 'FRIENDLY' ? 'friendly-dot' : 'unknown-dot';
            let color = status === 'HOSTILE' ? '#ff5555' : status === 'FRIENDLY' ? '#82cfff' : '#f59e0b';

            return L.divIcon({
                className: '',
                html: `
                    <div style="position:relative; width:16px; height:16px;">
                        <div class="${colorClass}" style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%) rotate(45deg); width:12px; height:12px; background:${color}; border:2px solid ${color};"></div>
                    </div>
                `,
                iconSize: [16, 16],
                iconAnchor: [8, 8]
            });
        }

        function updateAllTargets() {
            if (typeof SensorDataEngine === 'undefined' || !window.trackMarkers) return;
            const data = SensorDataEngine.state;
            const map = window.sensorMapInstance;
            if (!map) return;

            // Simple demo: show the main target and a few dummy ones
            const targets = [
                { id: 'bogey', callsign: 'BOGEY_G42', pos: data.target.pos, status: 'HOSTILE', class: 'SU-27' },
                { id: 'gripen', callsign: 'GRIPEN-1', pos: data.interceptor.pos, status: 'FRIENDLY', class: 'JAS-39' }
            ];

            targets.forEach(t => {
                if (!window._targetMarkers[t.id]) {
                    window._targetMarkers[t.id] = L.marker(t.pos, { icon: createTargetIcon(t.status) }).addTo(window.trackMarkers);
                } else {
                    window._targetMarkers[t.id].setLatLng(t.pos);
                }
            });

            // Update Sidebar Detail for active track
            const at = targets[0]; // BOGEY
            const set = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val; };
            set('target-callsign', at.callsign);
            set('target-class', at.class);
            set('sm-speed', (data.target.speedKts / 661).toFixed(2));
            set('sm-altitude', (data.target.altitude / 1000).toFixed(0) + 'K');
            set('sm-position', `${at.pos[0].toFixed(2)}°N ${at.pos[1].toFixed(2)}°E`);
            set('sm-range', data.target.range.toFixed(1) + ' NM');
            set('sm-fused-pct', data.fusedConfidence.toFixed(1) + '%');

            // Bars
            const br = document.getElementById('bar-radar'), be = document.getElementById('bar-esm'), bs = document.getElementById('bar-sat');
            if (br) br.style.width = data.sensors.radar.confidence + '%';
            if (be) be.style.width = data.sensors.esm.confidence + '%';
            if (bs) bs.style.width = data.sensors.satellite.confidence + '%';
        }

        // Listen for data updates
        window.addEventListener('sensor-update', updateAllTargets);

        // --- Lifecycle ---
        document.addEventListener('DOMContentLoaded', () => {
            initMap();
        });

        // For SPA navigation
        window.addEventListener('load', () => {
            if (document.getElementById('map-container')) initMap();
        });
    </script>
</body>

</html>
